name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: e.g. 0.1.24
    validations:
      required: true
  - type: dropdown
    id: format
    attributes:
      label: Plugin format
      options:
        - VST3
        - CLAP
        - AU
        - AUv3 (iOS/iPadOS)
        - LV2
        - Standalone
        - Other
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - iOS/iPadOS
    validations:
      required: true
  - type: input
    id: daw
    attributes:
      label: DAW and version
      placeholder: e.g. Reaper 7.x, Bitwig 5.x, Ableton 12
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we trigger this?
      value: |
        1.
        2.
        3.

